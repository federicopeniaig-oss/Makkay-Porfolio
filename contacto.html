<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hablemos — Makkay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #e8ff47;
    --border: rgba(255,255,255,0.08);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    text-align: center;
  }

  .page-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }

  .page-title {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    text-transform: uppercase;
    margin-bottom: 1rem;
    color: var(--accent);
  }

  .page-title em {
    font-style: normal;
    color: var(--accent);
  }

  .page-sub {
    font-size: 1rem;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.7;
    margin-bottom: 3.5rem;
  }

  /* CONTACT CARDS */
  .contact-cards {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 680px;
  }

  .contact-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    flex: 0 0 200px;
    min-width: 0;
    overflow: hidden;
  }

  .contact-card-info {
    text-align: left;
    min-width: 0;
    overflow: hidden;
  }

  .contact-card-handle {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
  }

  .contact-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    background: #1e1e1e;
  }

  .contact-card-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-card-icon svg {
    width: 26px; height: 26px;
  }

  .ig-icon { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
  .wa-icon { background: #25D366; }
  .gm-icon { background: #f5f5f5; }

  .contact-card:hover .contact-card-name {
    color: var(--accent);
  }

  /* BACK LINK */
  .back-link {
    margin-top: 3rem;
    font-size: 0.8rem;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .footer-copy {
    font-size: 0.72rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">

  </div>

  <a href="index.html" class="back-link">← Volver al portfolio</a>
</main>

<footer>
  <span class="footer-logo">Makkay</span>
  <p class="footer-copy">© 2025. Todos los derechos reservados.</p>
</footer>

</body>
</html>
